<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskForge Pro - Enterprise Task Management</title>
<link rel="stylesheet" href="website.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<!-- 1500 lines: Header, Sidebar, Dashboard, Kanban Board, Analytics, Settings, Modals, Auth -->
<div id="app">
  <header class="navbar">
    <div class="nav-left">
      <div class="logo"><i class="fa-solid fa-bolt"></i> TaskForge Pro</div>
      <div class="search-bar"><i class="fa-solid fa-search"></i><input type="text" id="globalSearch" placeholder="Search tasks, projects, users..."></div>
    </div>
    <div class="nav-right">
      <button class="btn btn-primary" id="createTaskBtn"><i class="fa-solid fa-plus"></i> New Task</button>
      <div class="user-avatar" id="userAvatar">DG</div>
    </div>
  </header>

  <div class="main-container">
    <aside class="sidebar" id="sidebar">
      <nav class="nav-menu">
        <a href="#" class="nav-item active" data-page="dashboard"><i class="fa-solid fa-gauge"></i> Dashboard</a>
        <a href="#" class="nav-item" data-page="kanban"><i class="fa-solid fa-columns"></i> Kanban Board</a>
        <a href="#" class="nav-item" data-page="calendar"><i class="fa-solid fa-calendar"></i> Calendar</a>
        <a href="#" class="nav-item" data-page="analytics"><i class="fa-solid fa-chart-line"></i> Analytics</a>
        <a href="#" class="nav-item" data-page="team"><i class="fa-solid fa-users"></i> Team</a>
        <a href="#" class="nav-item" data-page="settings"><i class="fa-solid fa-gear"></i> Settings</a>
      </nav>
    </aside>

    <main class="content" id="content">
      <!-- Dashboard Page -->
      <div class="page active" id="dashboardPage">
        <div class="page-header"><h1>Dashboard</h1><p>Welcome back, Dinesh</p></div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon blue"><i class="fa-solid fa-list-check"></i></div><div class="stat-info"><h3 id="totalTasks">0</h3><p>Total Tasks</p></div></div>
          <div class="stat-card"><div class="stat-icon green"><i class="fa-solid fa-circle-check"></i></div><div class="stat-info"><h3 id="completedTasks">0</h3><p>Completed</p></div></div>
          <div class="stat-card"><div class="stat-icon yellow"><i class="fa-solid fa-clock"></i></div><div class="stat-info"><h3 id="pendingTasks">0</h3><p>Pending</p></div></div>
          <div class="stat-card"><div class="stat-icon red"><i class="fa-solid fa-triangle-exclamation"></i></div><div class="stat-info"><h3 id="overdueTasks">0</h3><p>Overdue</p></div></div>
        </div>
        <div class="dashboard-grid">
          <div class="chart-card"><h3>Task Completion Trend</h3><canvas id="completionChart"></canvas></div>
          <div class="activity-card"><h3>Recent Activity</h3><div id="recentActivity"></div></div>
        </div>
      </div>

      <!-- Kanban Board Page -->
      <div class="page" id="kanbanPage">
        <div class="page-header"><h1>Kanban Board</h1><button class="btn btn-secondary" id="addColumnBtn"><i class="fa-solid fa-plus"></i> Add Column</button></div>
        <div class="kanban-board" id="kanbanBoard"></div>
      </div>

      <!-- Calendar Page -->
      <div class="page" id="calendarPage">
        <div class="page-header"><h1>Calendar</h1><div class="calendar-controls"><button id="prevMonth"><i class="fa-solid fa-chevron-left"></i></button><h2 id="currentMonth"></h2><button id="nextMonth"><i class="fa-solid fa-chevron-right"></i></button></div></div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>

      <!-- Analytics Page -->
      <div class="page" id="analyticsPage">
        <div class="page-header"><h1>Analytics</h1></div>
        <div class="analytics-grid">
          <div class="chart-card"><h3>Tasks by Priority</h3><canvas id="priorityChart"></canvas></div>
          <div class="chart-card"><h3>Team Performance</h3><canvas id="teamChart"></canvas></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Task Modal -->
  <div class="modal" id="taskModal">
    <div class="modal-content">
      <div class="modal-header"><h2 id="modalTitle">Create Task</h2><button class="modal-close" id="closeModal"><i class="fa-solid fa-xmark"></i></button></div>
      <form id="taskForm">
        <div class="form-group"><label>Task Title</label><input type="text" id="taskTitle" required></div>
        <div class="form-group"><label>Description</label><textarea id="taskDesc" rows="4"></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Priority</label><select id="taskPriority"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option><option value="urgent">Urgent</option></select></div>
          <div class="form-group"><label>Due Date</label><input type="date" id="taskDueDate"></div>
        </div>
        <div class="form-group"><label>Assignee</label><select id="taskAssignee"></select></div>
        <div class="form-actions"><button type="button" class="btn btn-secondary" id="cancelTask">Cancel</button><button type="submit" class="btn btn-primary">Save Task</button></div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="website.js"></script>
</body>
</html>
