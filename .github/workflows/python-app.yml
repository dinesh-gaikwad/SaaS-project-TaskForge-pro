mkdir -p .github/workflows
cat > .github/workflows/python-app.yml << 'EOF'
name: TaskForge Pro CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_DATABASE: taskforge
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask-cors mysql-connector-python gunicorn pytest

    - name: Import database schema
      run: |
        mysql -h 127.0.0.1 -u root taskforge < website.sql

    - name: Run Flask app test
      run: |
        python -c "from website import app; print('Flask app imports successfully')"
        
    - name: Start Flask server in background
      run: |
        sed -i 's/port=5000/port=5001/g' website.py
        python website.py &
        sleep 5

    - name: Test API health
      run: |
        curl -f http://localhost:5001/api/stats || exit 1
        echo "✅ API is responding"

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy notification
      run: echo "✅ TaskForge Pro deployed successfully to GitHub"
EOF
